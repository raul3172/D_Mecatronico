# arm_controllers.yaml
# =====================
# Dos controladores independientes:
#   arm_controller    → 4 joints del brazo + riel
#   gripper_controller → 1 joint del gripper (abre/cierra)
#
# Mantenerlos separados permite enviar comandos al gripper
# sin interrumpir la trayectoria del brazo y viceversa.

controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

# ── Controlador del brazo (4 joints) ─────────────────────────────
arm_controller:
  ros__parameters:
    joints:
      - moviento_en_x           # Riel lineal  [0 → 0.30 m]
      - disco_soportes_rotacion # Hombro       [±2.094 rad]
      - brazo_motores           # Codo         [±2.094 rad]
      - brazo_gripper_azul      # Muñeca       [±2.094 rad]

    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

    #gains:
    #  moviento_en_x:           {p: 500.0, i: 10.0, d: 20.0, i_clamp: 5.0}
    #  disco_soportes_rotacion: {p: 2.0,   i: 0.05, d: 0.10, i_clamp: 0.5}
    #  brazo_motores:           {p: 2.0,   i: 0.05, d: 0.10, i_clamp: 0.5}
    #  brazo_gripper_azul:      {p: 2.0,   i: 0.05, d: 0.10, i_clamp: 0.2}

# ── Controlador del gripper (1 joint) ────────────────────────────
gripper_controller:
  ros__parameters:
    joints:
      - gripper_mecanismo        # Gripper [0.0=cerrado → 1.0=abierto rad]

    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

    #gains:
    #  gripper_mecanismo: {p: 5.0, i: 0.1, d: 0.5, i_clamp: 1.0}